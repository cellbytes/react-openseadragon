version: 2
updates:
  # npm dependencies. Tracks upstream OpenSeadragon (and its types) since they
  # are listed as direct peer + dev dependencies, plus React and the toolchain.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: fix(deps)
      prefix-development: chore(deps)
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      openseadragon:
        patterns:
          - 'openseadragon'
          - '@types/openseadragon'

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(deps)
