name: Release

on:
  push:
    branches: [main]

# Default to read-only for every job. The release job below grants itself the
# specific writes semantic-release needs.
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write #       - semantic-release/git pushes the changelog + tag
      issues: write #         - semantic-release/github annotates fixed issues
      pull-requests: write #  - semantic-release/github annotates fixed issues
      id-token: write #       - OIDC for npm Trusted Publishers + provenance
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: true

      # Authentication uses npm's Trusted Publishers (OIDC) flow:
      #   https://docs.npmjs.com/trusted-publishers
      # Trusted Publishers requires npm >= 11.5.1; Node 24 ships a new-enough
      # npm out of the box (see .nvmrc), so no manual upgrade step is needed.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
