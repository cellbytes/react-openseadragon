name: Release

on:
  push:
    branches: [main]

# Allow semantic-release to push the changelog/version commit and tag, open
# release notes, and publish to npm with provenance.
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: true

      # Authentication uses npm's Trusted Publishers (OIDC) flow:
      #   https://docs.npmjs.com/trusted-publishers
      # The npm CLI must be >=11.5.1 (Node 22.x ships an older one).
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for Trusted Publishers (OIDC)
        run: npm install -g npm@latest

      - run: npm ci

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
